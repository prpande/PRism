name: Publish Desktop

# Packages the Electron desktop shell (v0.2.*) and attaches the unsigned
# installers to a draft GitHub Release. The existing publish.yml still owns the
# v0.1.* browser-tab binary, so that fallback artifact is preserved.
#
# Packaging only — this does NOT run the Playwright _electron e2e (that suite is
# local/manual per the desktop-shell plan). Fires on manual dispatch only.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.2.0)'
        required: true
        type: string
      base_ref:
        description: 'Generate release notes FROM this tag/branch/SHA (overrides the auto-detected previous tag — e.g. span several releases back to an earlier major). Leave blank to diff from the immediately-preceding tag.'
        required: false
        type: string
        default: ''
      include_macos:
        description: 'Build + attach the macOS .dmg (only if a Mac tester is confirmed).'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # required to create/update the draft Release

jobs:
  # Author human-readable release notes ONCE, then hand them to the build legs.
  # The build job below is a serialized matrix and both legs call
  # action-gh-release against the same draft; an inline notes step would run
  # per-leg and the second leg would clobber the first leg's body. Computing the
  # notes in a dedicated job (a single Copilot call) and exposing them as an
  # output keeps the body deterministic and identical across legs.
  release_notes:  # underscore, not hyphen: `needs.<id>` / dot-notation can't reference a hyphenated id
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read  # the github-api pr-strategy discovers PRs via the REST API
    outputs:
      body: ${{ steps.notes.outputs['release-notes'] }}  # bracket notation: the action's output key is hyphenated
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # actions/checkout v7.0.0
        with:
          fetch-depth: 0  # full history + tags so the previous tag resolves
      - name: Resolve base ref for release notes
        id: prevtag
        shell: bash
        env:
          TAG: ${{ inputs.tag }}                 # via env, never interpolated into the script (injection-safe)
          BASE_OVERRIDE: ${{ inputs.base_ref }}  # optional explicit base; blank = auto-detect previous tag
        run: |
          if [ -n "$BASE_OVERRIDE" ]; then
            # Explicit base: accept a tag, branch, or SHA that resolves to a commit.
            # --end-of-options so a base_ref starting with '-' is read as a rev, not an option.
            # (`--` is wrong here: for rev-parse it separates revs from paths.)
            if git rev-parse -q --verify --end-of-options "${BASE_OVERRIDE}^{commit}" >/dev/null; then
              prev="$BASE_OVERRIDE"
              echo "Using explicit base ref: $prev" >> "$GITHUB_STEP_SUMMARY"
            else
              prev="$(git describe --tags --abbrev=0 --exclude "$TAG" 2>/dev/null || true)"
              echo "WARNING: base_ref '$BASE_OVERRIDE' did not resolve — falling back to the previous tag ($prev)." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            # Auto: most recent tag reachable from HEAD, excluding the tag being
            # cut now (the new tag may not exist yet, or may already point at HEAD).
            prev="$(git describe --tags --abbrev=0 --exclude "$TAG" 2>/dev/null || true)"
          fi
          echo "tag=$prev" >> "$GITHUB_OUTPUT"
          if [ -z "$prev" ]; then
            echo "No base ref found — Copilot notes skipped; the release falls back to GitHub's auto-notes." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Generating release notes for $prev..${TAG}" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Generate release notes (Copilot)
        id: notes
        if: steps.prevtag.outputs.tag != ''
        continue-on-error: true  # never block a release if Copilot is unavailable
        uses: github/copilot-release-notes@9eea0a5e7bcf7d5bdb8942b66d36b4b82dea631b  # github/copilot-release-notes@main (no tagged releases)
        with:
          base-ref: ${{ steps.prevtag.outputs.tag }}
          head-ref: ${{ github.sha }}  # the SHA being released; the tag may not exist yet
          pr-strategy: github-api  # PRism squash-merges — merge-commits (default) finds nothing
          instructions: .github/release-notes-style.md
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}  # PR discovery for the github-api strategy
      - name: Surface diagnostics for the draft reviewer
        if: steps.notes.outcome == 'success'
        shell: bash
        env:
          # Env, not inline ${{ }} in the script — these are derived from PR
          # titles and could otherwise inject shell (GitHub hardening guidance).
          UNCERTAIN: ${{ steps.notes.outputs['uncertain-entries'] }}
          SKIPPED: ${{ steps.notes.outputs['skipped-prs'] }}
        run: |
          {
            echo "### Copilot release-notes diagnostics"
            echo "Review these before publishing the draft."
            echo ""
            echo "Uncertain entries:"
            printf '%s\n' "$UNCERTAIN"
            echo ""
            echo "Skipped PRs:"
            printf '%s\n' "$SKIPPED"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    needs: release_notes
    strategy:
      fail-fast: false
      # Serialize the legs: both call action-gh-release against the SAME draft
      # tag. With include_macos=true, parallel legs would race to *create* the
      # release and one would 422. max-parallel:1 makes the first leg create the
      # draft and the second update it.
      max-parallel: 1
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            binary: PRism-win-x64.exe       # final name resolveBinaryPath() expects
            dotnet_binary: PRism.Web.exe     # raw `dotnet publish` output (pre-rename)
          # macos-14 (not macos-latest) guarantees an arm64 runner so the dmg is
          # built natively for the osx-arm64 sidecar target.
          - os: macos-14
            rid: osx-arm64
            binary: PRism-osx-arm64
            dotnet_binary: PRism.Web
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      # checkout SHA-pinned (mutable tags can be force-pushed; pinned SHAs cannot;
      # Dependabot bumps it). The .NET SDK + Node versions/pins live in the
      # composite. This job caches BOTH lockfiles — frontend (build) and desktop
      # (pack) — so it passes the multiline cache-dependency-path block through to
      # the composite's setup-node (the one caller that overrides the default).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # actions/checkout v7.0.0
      - uses: ./.github/actions/setup-toolchain
        with:
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      # Gate on matrix.rid, NOT the runner label — the label is a packaging detail
      # that can change (it was macos-latest, now macos-14); rid is the stable
      # identity of "the mac leg" and won't silently un-skip if the label moves.
      - name: Skip macOS unless requested
        if: matrix.rid == 'osx-arm64' && inputs.include_macos != true
        shell: bash
        run: echo "SKIP_JOB=1" >> "$GITHUB_ENV"

      # Vite writes directly into PRism.Web/wwwroot (vite.config.ts build.outDir),
      # so this MUST run before `dotnet publish` bundles wwwroot into the binary.
      - name: Frontend install + build
        if: env.SKIP_JOB != '1'
        working-directory: frontend
        run: npm ci && npm run build

      # -p:PublishProfile=ci activates the gated single-file PropertyGroup in
      # PRism.Web.csproj. --self-contained stays explicit as a belt-and-suspenders
      # guard (same rationale as publish.yml).
      - name: Publish sidecar
        if: env.SKIP_JOB != '1'
        run: >
          dotnet publish PRism.Web/PRism.Web.csproj
          --runtime ${{ matrix.rid }} --self-contained --configuration Release
          -p:PublishProfile=ci --output desktop/sidecar

      - name: Rename sidecar binary
        if: env.SKIP_JOB != '1'
        shell: bash
        run: mv "desktop/sidecar/${{ matrix.dotnet_binary }}" "desktop/sidecar/${{ matrix.binary }}"

      # electron-builder names artifacts from package.json version, NOT the
      # dispatch tag. Sync them so a v0.2.1 release attaches 0.2.1-named binaries
      # instead of the committed 0.2.0. Invalid-semver tags fail loudly here.
      - name: Sync desktop version to release tag
        if: env.SKIP_JOB != '1'
        working-directory: desktop
        shell: bash
        run: |
          VERSION="${{ inputs.tag }}"
          npm version "${VERSION#v}" --no-git-tag-version --allow-same-version

      - name: Desktop install + pack
        if: env.SKIP_JOB != '1'
        working-directory: desktop
        run: npm ci && npm run dist

      - name: Upload to draft Release
        if: env.SKIP_JOB != '1'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # softprops/action-gh-release v3.0.1
        with:
          tag_name: ${{ inputs.tag }}
          name: PRism Desktop ${{ inputs.tag }}
          draft: true
          # Copilot-authored, human-readable notes on top; softprops prepends
          # `body` to the auto-generated section. Empty when the notes job's
          # step failed or there was no previous tag — a graceful fallback to
          # GitHub's auto-notes alone. draft stays true so a human reviews and
          # edits before publishing (this is also where Copilot's flagged
          # "uncertain entries" get checked).
          body: ${{ needs.release_notes.outputs.body }}
          generate_release_notes: true
          # Newline-separated explicit globs — the proven idiom in publish.yml.
          # Blank-line entries are no-ops, so a job that produces no .dmg is fine.
          files: |
            desktop/release/*.exe
            desktop/release/*.dmg
