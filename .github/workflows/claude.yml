name: Claude Code

on:
  # NOTE: pull_request_review_comment and pull_request_review are intentionally
  # omitted. Those events are emitted by reviewer bots (Copilot, claude[bot]),
  # whose runs are gated by the "first_time_contributors" approval policy and
  # pile up as action_required noise on every PR. We only ever summon Claude
  # via PR/issue conversation comments (issue_comment) or issue assignment;
  # the review events have never produced a real (non-skipped) run. Re-add them
  # only if you start invoking @claude from inline diff comments or reviews.
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Author-association gate (prompt-injection defense): the comment/issue body becomes
    # the agent's prompt, so only summon Claude for trusted authors. On a public repo any
    # drive-by commenter could otherwise inject instructions. OWNER/MEMBER/COLLABORATOR
    # are the repo-trusted associations; CONTRIBUTOR/FIRST_TIME_CONTRIBUTOR/NONE are not.
    #
    # For the issues branch we gate on the ISSUE AUTHOR's association (github.event.issue
    # .author_association) — NOT an assignee or any other actor — because the issue body,
    # written by that author, is what becomes the agent's prompt. So the author is the
    # trust principal. A trusted user who wants @claude to act on an untrusted person's
    # issue should summon it via their OWN comment (the issue_comment branch gates on the
    # commenter), which makes their trusted text the prompt instead of the untrusted body.
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # actions/checkout v7.0.0
        with:
          fetch-depth: 1

      # Workaround for anthropics/claude-code-action#1254: the action's
      # native installer reports success but leaves no binary at
      # ~/.local/bin/claude on some runners. Install explicitly here so
      # the binary is present before the action's runtime checks fire.
      # Drop this step (and the pin below) once the upstream regression is resolved.
      - name: Pre-install Claude Code CLI
        shell: bash
        env:
          # Supply-chain hardening (#607-C): DOWNLOAD the bootstrap installer, verify it
          # byte-for-byte against this pin, and only THEN execute it — instead of piping an
          # unpinned remote script straight into bash on a runner that the action step later
          # hands CLAUDE_CODE_OAUTH_TOKEN. The bootstrap script itself verifies the
          # downloaded CLI binary's SHA256 against a per-release manifest, so pinning the
          # script + the script's own binary checksum gives end-to-end integrity.
          #
          # FAIL-CLOSED: if Anthropic legitimately updates the bootstrap script this step
          # fails until a maintainer re-reviews the new script and updates this hash — the
          # intended behavior for a token-bearing step. Recompute with:
          #   curl -fsSL https://claude.ai/install.sh | sha256sum
          # (pinned 2026-07-03; claude.ai/install.sh redirects to
          # downloads.claude.ai/claude-code-releases/bootstrap.sh)
          #
          # RESIDUAL (upstream limitation): the bootstrap always downloads the LATEST CLI
          # regardless of any version argument, so the CLI version is not pinnable here —
          # but each binary is still manifest-checksum-verified by the script.
          CLAUDE_INSTALLER_SHA256: b3f79015b54c751440a6488f07b1b64f9088742b9052bc1bd356d13108320d2a
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh -o "$RUNNER_TEMP/claude-install.sh"
          echo "${CLAUDE_INSTALLER_SHA256}  $RUNNER_TEMP/claude-install.sh" | sha256sum -c -
          bash "$RUNNER_TEMP/claude-install.sh"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

