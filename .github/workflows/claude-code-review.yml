name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Skip on Dependabot PRs. Two reasons:
    #
    # 1. Secrets store split: Dependabot-triggered workflow runs use a separate
    #    secret store ("Secret source: Dependabot") rather than Actions secrets,
    #    so `secrets.CLAUDE_CODE_OAUTH_TOKEN` resolves to an empty string. The
    #    action then falls back to OIDC-based app token exchange, which 401s
    #    with "Workflow validation failed".
    #
    # 2. Any Dependabot PR that bumps an action used in this very workflow
    #    (e.g. `actions/checkout`) modifies `claude-code-review.yml` itself,
    #    which makes the OIDC validation fail unconditionally even if the
    #    secret were available — the action requires the workflow file on the
    #    PR head to match the version on the default branch.
    #
    # Dependabot PRs are heavily scoped (version bumps only) and already gated
    # by `build-and-test`. The claude review buys little here and produces
    # noise via consistently-red checks.
    if: github.actor != 'dependabot[bot]'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # Workaround for anthropics/claude-code-action#1254: the action's
      # native installer reports success but leaves no binary at
      # ~/.local/bin/claude on some runners. Install explicitly here so
      # the binary is present before the action's runtime checks fire.
      # Drop this step once the upstream regression is resolved.
      - name: Pre-install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

