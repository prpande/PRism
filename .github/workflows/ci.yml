name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # actions/checkout v6.0.3

      # Supply-chain guard: any workflow that SHA-pins third-party actions must
      # resolve all unresolved-pin placeholders before merge. A literal placeholder
      # left in the YAML would fail at workflow-run time with an opaque "unable to
      # resolve action" error; failing the lint here surfaces it on the PR instead.
      # The needle is assembled from substrings so this guard does not match itself.
      - name: Reject unresolved commit-SHA placeholders in .github/
        shell: bash
        run: |
          NEEDLE='<'"commit-sha"'>'
          if grep -rnF --include='*.yml' --include='*.yaml' "$NEEDLE" .github/; then
            echo "ERROR: unresolved $NEEDLE placeholder in .github/ — resolve via 'gh api repos/<owner>/<repo>/git/ref/tags/<tag> --jq .object.sha' before merge." >&2
            exit 1
          fi

      # Toolchain (.NET SDK + Node versions + their pins) lives in the composite.
      - uses: ./.github/actions/setup-toolchain

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test

      # Dependency-vulnerability gate (#614). Fails the build on ANY advisory
      # (low and above) across the WHOLE dependency tree — shipped and
      # dev-tooling alike — so the audit stays at zero rather than rotting back.
      # No --omit=dev scoping and no allowlist: the target is a hard zero (owner
      # directive), and a dev-only advisory is surfaced as loudly as a shipped one.
      #
      # Placed LAST in the job on purpose: a job halts at the first failing step,
      # so running audit after lint/build/test means a vulnerability alert (or a
      # transient registry blip — npm audit queries the live advisory DB) never
      # masks compile/test results for an otherwise-valid PR.
      #
      # Known tradeoff: because this fails the whole tree, the day a new dev-only
      # transitive advisory is published with no in-range fix, it reds this job on
      # every PR until addressed. If a future advisory can't be cleared without an
      # unacceptable major bump, relax this gate DELIBERATELY in a follow-up — the
      # relaxation PR edits this very step, so it self-clears its own red gate —
      # rather than silently weakening it.
      - name: Frontend audit (fail on any vulnerability)
        working-directory: frontend
        run: npm audit --audit-level=low
        # `npm audit` calls the live advisory DB, so a slow/unavailable registry
        # could otherwise hang to the job-level timeout. Bound it explicitly so a
        # network stall fails fast and legibly rather than silently stretching CI.
        timeout-minutes: 5

      - name: Restore (.NET)
        run: dotnet restore

      - name: Build (.NET)
        run: dotnet build --no-restore --configuration Release

      - name: Test (.NET)
        run: dotnet test --no-build --configuration Release --settings .runsettings --logger "trx;LogFileName=test-results.trx"

      - name: Upload .NET test artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # actions/upload-artifact v7.0.1
        with:
          name: dotnet-test-results
          path: '**/test-results.trx'

  # ---------------------------------------------------------------------------
  # Desktop Electron shell (desktop/). Compiles, lints, and unit-tests the shell
  # on every PR — previously NO workflow built desktop/ at all (#335). The unit
  # tier is pure tsc + node:test, so the Electron + Playwright BINARIES are not
  # needed; the *_SKIP_*_DOWNLOAD env vars (scoped to THIS job only) suppress the
  # postinstall downloads that otherwise stall the install (#336). Always-on
  # rather than paths-gated: the tier is ~1 min and gating would require a
  # third-party paths-filter action (itself needing a pin).
  # ---------------------------------------------------------------------------
  desktop:
    runs-on: windows-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # actions/checkout v6.0.3

      # Node-only: the desktop shell wraps a pre-published sidecar binary and never
      # invokes the .NET SDK directly. dotnet: 'false' skips that install.
      - uses: ./.github/actions/setup-toolchain
        with:
          dotnet: 'false'
          cache-dependency-path: desktop/package-lock.json

      - name: Desktop install
        working-directory: desktop
        run: npm ci

      - name: Desktop lint
        working-directory: desktop
        run: npm run lint

      - name: Desktop build
        working-directory: desktop
        run: npm run build

      - name: Desktop unit tests
        working-directory: desktop
        run: npm run test:unit

      # Dependency-vulnerability gate (#615), mirroring the frontend gate (#614).
      # Fails the build on ANY advisory (low and above) across the WHOLE desktop
      # tree. That tree is entirely dev/build tooling -- `electron` (the bundled
      # runtime) and `electron-builder` (packaging); there are no runtime npm
      # dependencies -- so a hard zero here (owner directive) keeps the packaged
      # app and its installer free of known-vulnerable transitives rather than
      # letting them rot back. No --omit=dev (everything is dev) and no allowlist.
      #
      # Placed LAST in the job on purpose: a job halts at the first failing step,
      # so auditing after lint/build/test means a vulnerability alert (or a
      # transient registry blip -- npm audit queries the live advisory DB) never
      # masks compile/test results for an otherwise-valid PR.
      #
      # Known tradeoff: because this fails the whole tree, the day a new
      # electron/electron-builder advisory is published with no in-range fix, it
      # reds this job on every PR until a major bump clears it (exactly the #615
      # situation). If a future advisory can't be cleared without an unacceptable
      # major bump, relax this gate DELIBERATELY in a follow-up -- the relaxation
      # PR edits this very step, so it self-clears its own red gate -- rather than
      # silently weakening it.
      - name: Desktop audit (fail on any vulnerability)
        working-directory: desktop
        run: npm audit --audit-level=low
        # `npm audit` calls the live advisory DB, so a slow/unavailable registry
        # could otherwise hang to the job-level timeout. Bound it explicitly so a
        # network stall fails fast and legibly rather than silently stretching CI.
        timeout-minutes: 5

  # ---------------------------------------------------------------------------
  # Browser e2e runs in the official Playwright CONTAINER on Linux, NOT on
  # windows-latest. `playwright install` hangs after the download completes —
  # confirmed on BOTH windows AND ubuntu runners: the ~112 MiB chrome-headless-
  # shell download finishes in ~2s, then the install never progresses past it and
  # times out (#171). That OS-independent post-download hang is exactly why the
  # suite was masked with continue-on-error rather than fixed. The Playwright
  # container ships the matching browser binaries PRE-INSTALLED, so there is no
  # install step to hang. The web app under test (Kestrel serving /api + the
  # React bundle, the fake .NET backend, the /test hooks) is platform-agnostic;
  # only Windows single-binary PACKAGING differs, never exercised by a browser
  # e2e. The image tag is pinned to the locked @playwright/test version so the
  # baked browser revision matches (bump both together).
  # ---------------------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # actions/checkout v6.0.3

      - uses: ./.github/actions/setup-toolchain

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Restore (.NET)
        run: dotnet restore

      # No `playwright install` — the container ships the browsers. Assert the
      # baked headless shell is present so a future image/version drift fails
      # loudly here rather than mid-suite.
      - name: Verify Playwright browser is present (baked into image)
        working-directory: frontend
        shell: bash
        run: |
          root="${PLAYWRIGHT_BROWSERS_PATH:-/ms-playwright}"
          if find "$root" -name 'chrome-headless-shell' -type f 2>/dev/null | grep -q .; then
            echo "Found headless shell under $root"
          else
            echo "chrome-headless-shell not found under $root — image/version mismatch (#171)." >&2
            exit 1
          fi

      # No continue-on-error: a genuine e2e failure now turns the job RED. The
      # D104 tablist a11y violation is allowlisted inside a11y-audit.spec.ts (#174).
      - name: Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: 'true'
        timeout-minutes: 30

      # Always upload. On the FIRST Linux run the pixel-parity specs have no
      # linux/ baseline yet, so Playwright WRITES them under
      # e2e/__screenshots__/linux/ and fails those tests — download this artifact
      # once to commit the linux baselines (the win32 ones were for the old,
      # broken windows path and don't match a Linux runner).
      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # actions/upload-artifact v7.0.1
        with:
          name: e2e-results
          path: |
            frontend/e2e/__screenshots__/
            frontend/playwright-report/
            frontend/test-results/
