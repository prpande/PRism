name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      # Supply-chain guard: any workflow that SHA-pins third-party actions must
      # resolve all unresolved-pin placeholders before merge. A literal placeholder
      # left in the YAML would fail at workflow-run time with an opaque "unable to
      # resolve action" error; failing the lint here surfaces it on the PR instead.
      # The needle is assembled from substrings so this guard does not match itself.
      - name: Reject unresolved commit-SHA placeholders in .github/
        shell: bash
        run: |
          NEEDLE='<'"commit-sha"'>'
          if grep -rnF --include='*.yml' --include='*.yaml' "$NEEDLE" .github/; then
            echo "ERROR: unresolved $NEEDLE placeholder in .github/ — resolve via 'gh api repos/<owner>/<repo>/git/ref/tags/<tag> --jq .object.sha' before merge." >&2
            exit 1
          fi

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Restore (.NET)
        run: dotnet restore

      - name: Build (.NET)
        run: dotnet build --no-restore --configuration Release

      - name: Test (.NET)
        run: dotnet test --no-build --configuration Release --settings .runsettings --logger "trx;LogFileName=test-results.trx"

      # The windows-latest runner extracts the Playwright browser as thousands of
      # files; Windows Defender scans each one as it lands, which historically hung
      # the install past 10 min and produced no browser (#171 — the 2026-05-29
      # regression). Two mitigations, in order:
      #   1. Exclude the browser dir from Defender so extraction isn't scanned.
      #   2. Cache the extracted binaries so only a cache MISS ever pays the cost.
      # The suite runs only the headless `chromium` project (no channel), so we
      # install JUST chrome-headless-shell (`--only-shell`) — `npx playwright
      # install chromium` never fetched that separate build, so every spec died at
      # launch (#171). `--with-deps` stays off (Linux-only no-op on windows).
      - name: Exclude Playwright browser dir from Defender
        shell: pwsh
        continue-on-error: true # tamper-protection may block it; cache+timeout still cover us
        run: |
          $p = "$env:LOCALAPPDATA\ms-playwright"
          New-Item -ItemType Directory -Force -Path $p | Out-Null
          Add-MpPreference -ExclusionPath $p
          Write-Host "Added Defender exclusion for $p"

      - name: Restore Playwright browser cache
        id: pw-cache
        uses: actions/cache/restore@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Playwright install (headless shell)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npx playwright install --only-shell
        timeout-minutes: 20

      # Loud failure if the browser is missing (hung/partial install, or an empty
      # cache) — replaces the old silent continue-on-error mask on the test step.
      - name: Verify Playwright browser is installed
        working-directory: frontend
        shell: pwsh
        run: |
          $root = if ($env:PLAYWRIGHT_BROWSERS_PATH) { $env:PLAYWRIGHT_BROWSERS_PATH } else { "$env:LOCALAPPDATA\ms-playwright" }
          $shell = Get-ChildItem -Path $root -Recurse -Filter 'chrome-headless-shell.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $shell) {
            Write-Error "chrome-headless-shell.exe not found under $root — Playwright install failed or omitted the headless shell (see #171)."
            exit 1
          }
          Write-Host "Found headless shell: $($shell.FullName)"

      # Save the cache ONLY on a clean miss+install+verify, so a partial/hung
      # extraction is never persisted (a poisoned cache would break every run).
      - name: Save Playwright browser cache
        if: steps.pw-cache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: ~\AppData\Local\ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      # No continue-on-error: a genuine e2e failure now turns the job RED. The
      # D104 tablist a11y violation is allowlisted inside a11y-audit.spec.ts (#174).
      - name: Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: 'true'
        timeout-minutes: 30

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/test-results.trx
            frontend/test-results/
            frontend/playwright-report/
