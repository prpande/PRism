name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      # Supply-chain guard: any workflow that SHA-pins third-party actions must
      # resolve all unresolved-pin placeholders before merge. A literal placeholder
      # left in the YAML would fail at workflow-run time with an opaque "unable to
      # resolve action" error; failing the lint here surfaces it on the PR instead.
      # The needle is assembled from substrings so this guard does not match itself.
      - name: Reject unresolved commit-SHA placeholders in .github/
        shell: bash
        run: |
          NEEDLE='<'"commit-sha"'>'
          if grep -rnF --include='*.yml' --include='*.yaml' "$NEEDLE" .github/; then
            echo "ERROR: unresolved $NEEDLE placeholder in .github/ — resolve via 'gh api repos/<owner>/<repo>/git/ref/tags/<tag> --jq .object.sha' before merge." >&2
            exit 1
          fi

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Restore (.NET)
        run: dotnet restore

      - name: Build (.NET)
        run: dotnet build --no-restore --configuration Release

      - name: Test (.NET)
        run: dotnet test --no-build --configuration Release --settings .runsettings --logger "trx;LogFileName=test-results.trx"

      # INSTALL: the suite runs only the headless `chromium` project (no channel),
      # so install JUST the chrome-headless-shell binary it actually launches.
      # `npx playwright install chromium` did NOT fetch the separate
      # chrome-headless-shell build, so every browser spec died at launch while
      # `continue-on-error` reported green (#171). `--only-shell` installs exactly
      # what's needed and is a smaller download (lower extraction-hang surface than
      # the full headed Chromium — the 2026-05-29 regression). `--with-deps` stays
      # off: it is a Linux-only no-op on windows-latest.
      #
      # `continue-on-error` is retained ONLY on install (extraction-hang
      # resilience) but is no longer a silent mask: the guard step below FAILS
      # the job loudly if the browser is missing, and the test step now gates.
      - name: Playwright install (headless shell)
        working-directory: frontend
        run: npx playwright install --only-shell
        timeout-minutes: 10
        continue-on-error: true

      # Loud failure if install hung/omitted the binary — replaces the old silent
      # `continue-on-error` mask on the test step. `playwright install --dry-run`
      # prints the resolved install location and exits non-zero work-free; we
      # assert the headless-shell executable actually exists on disk.
      - name: Verify Playwright browser is installed
        working-directory: frontend
        shell: pwsh
        run: |
          $root = if ($env:PLAYWRIGHT_BROWSERS_PATH) { $env:PLAYWRIGHT_BROWSERS_PATH } else { "$env:LOCALAPPDATA\ms-playwright" }
          $shell = Get-ChildItem -Path $root -Recurse -Filter 'chrome-headless-shell.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $shell) {
            Write-Error "chrome-headless-shell.exe not found under $root — Playwright install failed or omitted the headless shell (see #171)."
            exit 1
          }
          Write-Host "Found headless shell: $($shell.FullName)"

      # No `continue-on-error`: a genuine e2e failure now turns the job RED. The
      # D104 tablist a11y violation is allowlisted inside a11y-audit.spec.ts (see
      # #174), so it no longer requires masking the whole suite.
      - name: Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: 'true'
        timeout-minutes: 30

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            **/test-results.trx
            frontend/test-results/
            frontend/playwright-report/
