name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      # Supply-chain guard: any workflow that SHA-pins third-party actions must
      # resolve all unresolved-pin placeholders before merge. A literal placeholder
      # left in the YAML would fail at workflow-run time with an opaque "unable to
      # resolve action" error; failing the lint here surfaces it on the PR instead.
      # The needle is assembled from substrings so this guard does not match itself.
      - name: Reject unresolved commit-SHA placeholders in .github/
        shell: bash
        run: |
          NEEDLE='<'"commit-sha"'>'
          if grep -rnF --include='*.yml' --include='*.yaml' "$NEEDLE" .github/; then
            echo "ERROR: unresolved $NEEDLE placeholder in .github/ — resolve via 'gh api repos/<owner>/<repo>/git/ref/tags/<tag> --jq .object.sha' before merge." >&2
            exit 1
          fi

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Restore (.NET)
        run: dotnet restore

      - name: Build (.NET)
        run: dotnet build --no-restore --configuration Release

      - name: Test (.NET)
        run: dotnet test --no-build --configuration Release --settings .runsettings --logger "trx;LogFileName=test-results.trx"

      - name: Upload .NET test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: dotnet-test-results
          path: '**/test-results.trx'

  # ---------------------------------------------------------------------------
  # Browser e2e runs on Linux, NOT windows-latest. The Playwright browser
  # EXTRACTION hangs indefinitely on windows-latest — the ~111 MiB download
  # finishes in ~2s, then Defender scans each of the thousands of extracted
  # files and the unzip never completes (the 2026-05-29 regression, #171). That
  # is exactly why the suite was previously masked with continue-on-error rather
  # than fixed. Linux extracts in seconds. The web app under test (Kestrel
  # serving /api + the React bundle, the fake .NET backend, the /test hooks) is
  # platform-agnostic; only the Windows single-binary PACKAGING differs, which a
  # browser e2e never exercised. So e2e gates here, for real.
  # ---------------------------------------------------------------------------
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Restore (.NET)
        run: dotnet restore

      # On Linux `--with-deps` IS required (installs the system libraries the
      # browser links against — unlike windows where it is a no-op). `--only-shell`
      # fetches just chrome-headless-shell, the binary this headless chromium suite
      # launches (`npx playwright install chromium` never fetched it — #171).
      - name: Playwright install (headless shell + deps)
        working-directory: frontend
        run: npx playwright install --with-deps --only-shell
        timeout-minutes: 10

      # Loud failure if the browser is missing — the test step gates, no mask.
      - name: Verify Playwright browser is installed
        working-directory: frontend
        shell: bash
        run: |
          root="${PLAYWRIGHT_BROWSERS_PATH:-$HOME/.cache/ms-playwright}"
          if find "$root" -name 'chrome-headless-shell' -type f 2>/dev/null | grep -q .; then
            echo "Found headless shell under $root"
          else
            echo "chrome-headless-shell not found under $root — Playwright install failed (#171)." >&2
            exit 1
          fi

      # No continue-on-error: a genuine e2e failure now turns the job RED. The
      # D104 tablist a11y violation is allowlisted inside a11y-audit.spec.ts (#174).
      - name: Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          CI: 'true'
        timeout-minutes: 30

      # Always upload. On the FIRST Linux run the pixel-parity specs have no
      # linux/ baseline yet, so Playwright WRITES them under
      # e2e/__screenshots__/linux/ and fails those tests — download this artifact
      # once to commit the linux baselines (the win32 ones were for the old,
      # broken windows path and don't match a Linux runner).
      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: |
            frontend/e2e/__screenshots__/
            frontend/playwright-report/
            frontend/test-results/
