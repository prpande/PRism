# Single source of truth for the .NET SDK + Node toolchain versions and their
# action pins. Every workflow job (ci.yml, integration-tests.yml, publish.yml,
# publish-desktop.yml) consumes this instead of re-declaring setup-dotnet /
# setup-node — so a toolchain bump (e.g. net11, Node 26) is a ONE-file edit here.
#
# checkout is NOT here: a local composite is fetched BY checkout, so it must run
# first in each job. upload-artifact is job-specific and stays in ci.yml. Those
# two pins remain per-file (Dependabot-maintained), which is unavoidable.
#
# Third-party action pins are commit SHAs (mutable tags can be force-pushed; SHAs
# cannot). Bump via Dependabot (.github/dependabot.yml, github-actions ecosystem).
name: Setup toolchain
description: Install the pinned .NET SDK and/or Node toolchain. Versions live ONLY here.

inputs:
  dotnet:
    description: Set up the .NET SDK. Pass 'false' for Node-only jobs (e.g. desktop).
    default: 'true'
  node:
    description: Set up Node. Pass 'false' for .NET-only jobs (e.g. integration-tests).
    default: 'true'
  cache-dependency-path:
    # Accepts a newline-separated block for jobs that cache multiple lockfiles
    # (publish-desktop.yml restores frontend + desktop).
    description: npm lockfile path(s) for the setup-node cache.
    default: 'frontend/package-lock.json'

runs:
  using: composite
  steps:
    # Inputs are always strings; gate on the string 'true'. A caller's YAML boolean
    # `false` coerces to the string 'false', so == 'true' is the correct test.
    - if: ${{ inputs.dotnet == 'true' }}
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # actions/setup-dotnet v5.2.0
      with:
        dotnet-version: '10.0.x'

    - if: ${{ inputs.node == 'true' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # actions/setup-node v6.4.0
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
